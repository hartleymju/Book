name: Auto-mark Private Book

on:
  schedule:
    # Hourly looping job across US market hours: each run marks every ~60s
    # for up to 62 minutes while the market is open (09:30-16:00 New York,
    # enforced in mark.py). 13:29-20:29 UTC covers the session in EDT;
    # off-hours starts exit instantly.
    - cron: '29 13-20 * * 1-5'
    # Crypto/perp single-shot marks every 10 minutes during off-hours:
    # weekday nights (UTC hours outside the US session window) and all weekend.
    - cron: '*/10 0-12,21-23 * * *'
    - cron: '*/10 13-20 * * 0,6'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a one-shot mark incl. equities, any hour'
        required: false
        default: 'false'

concurrency:
  group: automark
  cancel-in-progress: false

jobs:
  mark:
    runs-on: ubuntu-latest
    timeout-minutes: 70
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Mark the book
        env:
          JSONBIN_KEY: ${{ secrets.JSONBIN_KEY }}
          JSONBIN_BIN: 6a4d02a9da38895dfe3adc02
          LOOP: ${{ github.event.schedule == '29 13-20 * * 1-5' && '1' || '0' }}
          LOOP_MINUTES: '62'
          FORCE: ${{ github.event.inputs.force == 'true' && '1' || '0' }}
        run: python mark.py
