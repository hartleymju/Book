<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Archivo:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap');

:root{
  --ink:#15181E; --surface:#1C2028; --line:#2C313B; --line-soft:#242832;
  --paper:#E9E5DA; --dim:#8E8B7F; --brass:#C4A265; --brass-dk:#9D8047;
  --gain:#7CB894; --loss:#CE7263;
}
*{box-sizing:border-box}
body{margin:0; min-height:100vh; background:var(--ink); color:var(--paper); font-family:'Archivo',system-ui,sans-serif; font-size:14px; line-height:1.5}
button{cursor:pointer; font-family:inherit}
:focus-visible{outline:2px solid var(--brass); outline-offset:2px}
@media (prefers-reduced-motion: reduce){ *{transition:none!important; animation:none!important} }

.mast{display:flex; align-items:center; justify-content:space-between; gap:16px; padding:18px 28px; border-bottom:1px solid var(--line); flex-wrap:wrap}
.mast-name{display:flex; align-items:center; gap:14px}
.mast-mark{font-family:'Fraunces',serif; font-size:22px; color:var(--ink); background:var(--brass); width:34px; height:34px; display:flex; align-items:center; justify-content:center; border-radius:2px}
.mast-title{font-family:'Fraunces',serif; font-size:18px; letter-spacing:0.02em}
.mast-sub{font-size:10px; letter-spacing:0.18em; text-transform:uppercase; color:var(--dim)}
.tabs{display:flex; gap:4px; flex-wrap:wrap}
.tab{background:none; border:1px solid transparent; color:var(--dim); padding:7px 14px; font-size:12px; letter-spacing:0.12em; text-transform:uppercase; border-radius:2px; transition:color .15s,border-color .15s}
.tab:hover{color:var(--paper)}
.tab.on{color:var(--brass); border-color:var(--brass-dk)}

.sync-row{display:flex; align-items:center; gap:10px; padding:8px 28px; border-bottom:1px solid var(--line-soft); font-size:11px; color:var(--dim); flex-wrap:wrap}
.sync-dot{width:8px; height:8px; border-radius:50%; background:var(--dim)}
.sync-dot.ok{background:var(--gain)} .sync-dot.err{background:var(--loss)} .sync-dot.off{background:var(--dim)}
.sync-row .spacer{margin-left:auto}

.nav-strip{display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:24px; padding:30px 28px 26px; border-bottom:1px solid var(--line); background:linear-gradient(180deg, rgba(196,162,101,0.045), rgba(196,162,101,0))}
.eyebrow{font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--dim)}
.nav-figure{font-family:'Fraunces',serif; font-weight:600; font-size:56px; line-height:1.05; margin-top:6px; font-variant-numeric:tabular-nums}
.nav-warn{margin-top:6px; font-size:12px; color:var(--brass)}
.nav-stats{display:flex; align-items:flex-end}
.nav-stat{padding:0 22px; border-left:1px solid var(--line)}
.nav-stat:first-child{border-left:none}
.stat-val{font-family:'Spline Sans Mono',monospace; font-size:18px; margin-top:6px; font-variant-numeric:tabular-nums}
.gain{color:var(--gain)} .loss{color:var(--loss)}
.cash-btn{background:none; border:none; color:var(--paper); padding:0; text-align:left; border-bottom:1px dashed var(--line); display:block; font-family:'Spline Sans Mono',monospace; font-size:18px; margin-top:6px}
.nav-action{display:flex; align-items:center}

.banner{margin:14px 28px 0; padding:10px 14px; border-radius:2px; font-size:13px; display:none}
.banner.show{display:block}
.banner.ok{background:rgba(124,184,148,0.12); color:var(--gain); border:1px solid rgba(124,184,148,0.3)}
.banner.err{background:rgba(206,114,99,0.12); color:var(--loss); border:1px solid rgba(206,114,99,0.3)}

.page{padding:26px 28px 40px; max-width:1180px}
.page-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:12px; flex-wrap:wrap}
.h2{font-family:'Fraunces',serif; font-weight:500; font-size:22px; margin:0}
.h3{font-family:'Fraunces',serif; font-weight:500; font-size:17px; margin:0}

.btn{background:var(--surface); border:1px solid var(--line); color:var(--paper); padding:8px 16px; font-size:12px; letter-spacing:0.08em; text-transform:uppercase; border-radius:2px; transition:border-color .15s}
.btn:hover:not(:disabled){border-color:var(--brass-dk)}
.btn:disabled{opacity:0.45; cursor:default}
.btn.brass{background:var(--brass); border-color:var(--brass); color:var(--ink); font-weight:600}
.btn.brass:hover:not(:disabled){background:#D2B37B}
.btn.ghost{background:transparent}
.btn.tiny{padding:4px 10px; font-size:11px}
.btn.danger{color:var(--loss)}

.table-wrap{overflow-x:auto; border:1px solid var(--line); border-radius:2px}
table{width:100%; border-collapse:collapse; min-width:840px}
th{font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim); font-weight:500; text-align:left; padding:10px 14px; border-bottom:1px solid var(--line); background:var(--surface)}
td{padding:12px 14px; border-bottom:1px solid var(--line-soft); vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(196,162,101,0.03)}
.num{text-align:right}
th.num{text-align:right}
.mono{font-family:'Spline Sans Mono',monospace; font-variant-numeric:tabular-nums; font-size:13px}
.tick{font-family:'Spline Sans Mono',monospace; font-weight:500; letter-spacing:0.04em}
.venue{font-size:11px; color:var(--dim); margin-top:2px}
.src{font-size:10px; color:var(--dim); margin-top:2px}
.dim{color:var(--dim)}

.empty{border:1px dashed var(--line); border-radius:2px; padding:34px; text-align:center; color:var(--dim); font-size:13px}

.sheet{border:1px solid var(--line); border-radius:2px; background:var(--surface); padding:20px; margin-bottom:22px}
.sheet-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:14px}
.sheet-foot{display:flex; justify-content:flex-end; align-items:center; gap:14px; margin-top:16px; flex-wrap:wrap}
.hint{font-size:12px; color:var(--dim); margin-right:auto}
.grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px}
.fld{display:flex; flex-direction:column; gap:5px}
.fld>span{font-size:10px; letter-spacing:0.16em; text-transform:uppercase; color:var(--dim)}
.fld.wide{grid-column:1/-1}
.inp{background:var(--ink); border:1px solid var(--line); color:var(--paper); padding:8px 10px; border-radius:2px; font-family:'Spline Sans Mono',monospace; font-size:13px; width:100%}
.inp:focus{border-color:var(--brass-dk); outline:none}
textarea.inp{font-family:'Archivo',sans-serif; min-height:64px; resize:vertical}
.row-inline{display:flex; gap:8px; align-items:center}

.blot-item{border:1px solid var(--line); border-radius:2px; padding:12px 16px; background:var(--surface); margin-bottom:10px}
.blot-line{display:flex; align-items:baseline; gap:14px; flex-wrap:wrap}
.blot-line .date{margin-left:auto}
.side{font-size:10px; letter-spacing:0.16em; padding:2px 8px; border-radius:2px; font-weight:600}
.side.buy{background:rgba(124,184,148,0.15); color:var(--gain)}
.side.sell{background:rgba(206,114,99,0.15); color:var(--loss)}
.blot-note{margin:8px 0 0; font-size:13px; border-left:2px solid var(--brass-dk); padding-left:12px; opacity:0.9}

.idea-list{display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:14px}
.idea{border:1px solid var(--line); border-radius:2px; background:var(--surface); padding:16px}
.idea.passed{opacity:0.55}
.idea-head{display:flex; align-items:center; gap:10px; flex-wrap:wrap}
.idea-head .date{margin-left:auto}
.dir{font-size:10px; letter-spacing:0.14em; padding:2px 7px; border-radius:2px}
.dir.long{background:rgba(124,184,148,0.15); color:var(--gain)}
.dir.short{background:rgba(206,114,99,0.15); color:var(--loss)}
.dir.event{background:rgba(196,162,101,0.15); color:var(--brass)}
.status{font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--dim)}
.status.s-entered{color:var(--brass)}
.idea p{margin:10px 0 0; font-size:13px}
.idea .trg{color:var(--brass); font-size:12px; margin-top:8px}
.idea-actions{display:flex; gap:8px; margin-top:12px}

.wire-item{border:1px solid var(--line); border-radius:2px; background:var(--surface); padding:16px 18px; margin-bottom:12px; max-width:760px}
.wire-meta{display:flex; align-items:center; gap:10px; font-size:11px; flex-wrap:wrap}
.chip{font-family:'Spline Sans Mono',monospace; font-size:11px; color:var(--brass); border:1px solid var(--brass-dk); padding:1px 7px; border-radius:2px}
.wire-head{font-family:'Fraunces',serif; font-weight:500; font-size:16px; margin:8px 0 6px}
.wire-sum{margin:0; font-size:13px; opacity:0.85}

.log-item{display:flex; gap:14px; padding:10px 0; border-bottom:1px solid var(--line-soft); font-size:13px; align-items:baseline}
.log-item:last-child{border-bottom:none}
.actor{font-size:10px; letter-spacing:0.14em; text-transform:uppercase; padding:2px 8px; border-radius:2px; flex-shrink:0}
.actor.you{background:rgba(233,229,218,0.08); color:var(--paper)}
.actor.claude{background:rgba(196,162,101,0.18); color:var(--brass)}
.actor.system{background:rgba(142,139,127,0.15); color:var(--dim)}
.log-ts{font-family:'Spline Sans Mono',monospace; font-size:11px; color:var(--dim); flex-shrink:0; width:120px}

.foot{display:flex; justify-content:space-between; align-items:center; gap:16px; padding:16px 28px 26px; border-top:1px solid var(--line); font-size:11px; color:var(--dim); flex-wrap:wrap}

code.kbd{background:var(--ink); border:1px solid var(--line); padding:1px 6px; border-radius:2px; font-size:12px}

@media (max-width:720px){
  .nav-figure{font-size:40px}
  .nav-strip{padding:22px 18px}
  .nav-stats{flex-wrap:wrap; gap:14px}
  .nav-stat{border-left:none; padding:0}
  .page{padding:20px 18px 32px}
}
</style>
</head>
<body>

<header class="mast">
  <div class="mast-name">
    <span class="mast-mark">P</span>
    <div>
      <div class="mast-title">Private Book</div>
      <div class="mast-sub">position monitor · collaborative edition</div>
    </div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>

<div class="sync-row">
  <span class="sync-dot off" id="syncDot"></span>
  <span id="syncLabel">Sync off — local only. Configure in Settings.</span>
  <span class="spacer"></span>
  <button class="btn tiny ghost" id="pullBtn">Pull</button>
  <button class="btn tiny ghost" id="pushBtn">Push</button>
</div>

<section class="nav-strip">
  <div>
    <div class="eyebrow" id="navEyebrow">Net asset value · unmarked</div>
    <div class="nav-figure" id="aumFig">$0</div>
    <div class="nav-warn" id="navWarn" style="display:none"></div>
  </div>
  <div class="nav-stats">
    <div class="nav-stat"><div class="eyebrow">Unrealised</div><div class="stat-val" id="uplFig">—</div></div>
    <div class="nav-stat"><div class="eyebrow">Realised</div><div class="stat-val" id="rlzFig">—</div></div>
    <div class="nav-stat"><div class="eyebrow">Cash</div><button class="cash-btn" id="cashBtn" title="Edit cash">$0</button></div>
    <div class="nav-stat nav-action"><button class="btn brass" id="markBtn">Mark to market</button></div>
  </div>
</section>

<div class="banner" id="banner"></div>
<main class="page" id="page"></main>

<footer class="foot">
  <span>Marks: Hyperliquid mids (crypto &amp; HIP-3 dexes) · Yahoo live API (equities) · manual override. Base currency USD.</span>
  <button class="btn ghost danger" id="resetBtn">Reset book</button>
</footer>

<script>
"use strict";
// ————————————————————————————————————————————————
// Private Book — collaborative edition
// State lives locally (localStorage) and, when configured, in a private
// JSONBin the PM and Claude both read/write. Every mutation is logged.
// ————————————————————————————————————————————————

const LS_STATE = "pms_local_v1";
const LS_CFG   = "pms_sync_cfg_v1";
const ACTOR    = "you"; // Claude writes with actor "claude" when editing the bin

const DEFAULT_STATE = {
  version: 1,
  cash: 0,
  realized: 0,
  positions: [], // {id,ticker,venue,qty,avgEntry,notes,openedAt}
  trades: [],    // {id,ticker,side,qty,price,date,commentary,ts}
  ideas: [],     // {id,ticker,direction,thesis,trigger,status,createdAt}
  prices: {},    // {TICKER:{px,ts,src}}
  news: { items: [], fetchedAt: null },
  changelog: [], // {ts,actor,action,detail}
  claudeNotes: "", // free-form message board Claude can write into
  cashSweep: true, // trades debit/credit the cash balance automatically
};

let state = load(LS_STATE, DEFAULT_STATE);
let cfg   = load(LS_CFG, { binId: "", key: "", finnhub: "", autoPull: false });
let page  = "book";
let remoteVersionSeen = state.version;
let pollTimer = null;

function load(k, dflt){ try { const v = localStorage.getItem(k); return v ? Object.assign({}, dflt, JSON.parse(v)) : {...dflt}; } catch(e){ return {...dflt}; } }
function persistLocal(){ try { localStorage.setItem(LS_STATE, JSON.stringify(state)); } catch(e){} }
function persistCfg(){ try { localStorage.setItem(LS_CFG, JSON.stringify(cfg)); } catch(e){} }

// ————— formatting —————
const fmtUSD = (n, dp) => {
  if (n === null || n === undefined || isNaN(n)) return "—";
  const abs = Math.abs(n);
  const d = dp !== undefined ? dp : abs >= 1000 ? 0 : abs >= 1 ? 2 : 4;
  return n.toLocaleString("en-US", { style:"currency", currency:"USD", minimumFractionDigits:d, maximumFractionDigits:d });
};
const fmtNum = n => (n===null||n===undefined||isNaN(n)) ? "—" : n.toLocaleString("en-US",{maximumFractionDigits:Math.abs(n)>=100?0:Math.abs(n)>=1?2:4});
const fmtPct = n => (n===null||isNaN(n)) ? "—" : `${n>=0?"+":""}${(n*100).toFixed(1)}%`;
const signed = (n, dp) => (n===null||n===undefined||isNaN(n)) ? "—" : `${n>=0?"+":"−"}${fmtUSD(Math.abs(n), dp)}`;
const timeStr = ts => ts ? new Date(ts).toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—";
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ————— changelog —————
function logEvent(action, detail, actor = ACTOR){
  state.changelog.unshift({ ts: Date.now(), actor, action, detail });
  if (state.changelog.length > 500) state.changelog.length = 500;
}

// commit = log + bump version + save + render + (push if synced)
function commit(action, detail, opts = {}){
  if (action) logEvent(action, detail);
  state.version += 1;
  persistLocal();
  render();
  if (cfg.binId && cfg.key && !opts.noPush) pushRemote(true);
}

// ————— sync (JSONBin v3) —————
const BIN_API = "https://api.jsonbin.io/v3/b";
function syncStatus(kind, msg){
  const dot = document.getElementById("syncDot");
  dot.className = "sync-dot " + kind;
  document.getElementById("syncLabel").textContent = msg;
}

async function createBin(){
  if (!cfg.key) return flash("err", "Enter your JSONBin master key first.");
  try {
    const res = await fetch(BIN_API, { method:"POST", headers:{ "Content-Type":"application/json", "X-Master-Key":cfg.key, "X-Bin-Name":"private-book", "X-Bin-Private":"true" }, body: JSON.stringify(state) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || res.status);
    cfg.binId = data.metadata.id; persistCfg();
    remoteVersionSeen = state.version;
    syncStatus("ok", `Synced · bin ${cfg.binId}`);
    flash("ok", `Book created in the cloud. Bin ID: ${cfg.binId} — share this with Claude to collaborate.`);
    render();
  } catch(e){ flash("err", `Could not create bin: ${e.message}`); }
}

async function pullRemote(silent){
  if (!cfg.binId || !cfg.key) return !silent && flash("err", "Sync not configured — see Settings.");
  try {
    syncStatus("off", "Pulling…");
    const res = await fetch(`${BIN_API}/${cfg.binId}/latest`, { headers:{ "X-Master-Key":cfg.key } });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || res.status);
    const remote = Object.assign({}, DEFAULT_STATE, data.record);
    const remoteNewer = (remote.lastWrite || 0) > (state.lastWrite || 0) || remote.version > state.version;
    if (remoteNewer){
      state = remote; remoteVersionSeen = remote.version;
      persistLocal(); render();
      syncStatus("ok", `Synced · v${state.version} pulled ${timeStr(Date.now())}`);
      if (!silent) flash("ok", "Pulled newer state from the cloud.");
    } else if (JSON.stringify(remote) === JSON.stringify(state)){
      remoteVersionSeen = remote.version;
      syncStatus("ok", `Synced · v${state.version} · up to date`);
      if (!silent) flash("ok", "Already up to date.");
    } else {
      // versions diverged — let the user choose explicitly instead of deadlocking
      remoteVersionSeen = remote.version;
      if (silent){ syncStatus("ok", `Diverged (local v${state.version} / cloud v${remote.version}) — press Pull to resolve.`); return; }
      const useCloud = confirm(`Local and cloud copies have diverged (local v${state.version}, cloud v${remote.version}).\n\nOK = replace local with the CLOUD copy (adopts Claude's latest changes).\nCancel = keep LOCAL and push it to the cloud.`);
      if (useCloud){
        state = remote; persistLocal(); render();
        syncStatus("ok", `Synced · adopted cloud v${state.version}`);
        flash("ok", "Adopted the cloud copy.");
      } else {
        state.version = Math.max(state.version, remote.version) + 1;
        persistLocal(); await pushRemote(false); render();
      }
    }
  } catch(e){ syncStatus("err", "Sync error"); if (!silent) flash("err", `Pull failed: ${e.message}`); }
}

async function pushRemote(silent){
  if (!cfg.binId || !cfg.key) return !silent && flash("err", "Sync not configured — see Settings.");
  try {
    // keep the version monotonic across both writers
    const chk = await fetch(`${BIN_API}/${cfg.binId}/latest`, { headers:{ "X-Master-Key":cfg.key } });
    if (chk.ok){
      const remote = (await chk.json()).record || {};
      if ((remote.version || 0) >= state.version) state.version = (remote.version || 0) + 1;
    }
    state.lastWrite = Date.now();
    persistLocal();
    const res = await fetch(`${BIN_API}/${cfg.binId}`, { method:"PUT", headers:{ "Content-Type":"application/json", "X-Master-Key":cfg.key }, body: JSON.stringify(state) });
    if (!res.ok){ const d = await res.json().catch(()=>({})); throw new Error(d.message || res.status); }
    remoteVersionSeen = state.version;
    syncStatus("ok", `Synced · v${state.version} pushed ${timeStr(Date.now())}`);
    if (!silent) flash("ok", "Pushed to the cloud.");
  } catch(e){ syncStatus("err", "Sync error"); if (!silent) flash("err", `Push failed: ${e.message}`); }
}

function setPolling(){
  clearInterval(pollTimer);
  if (cfg.autoPull && cfg.binId && cfg.key) pollTimer = setInterval(() => pullRemote(true), 60000);
}

// ————— pricing —————
// Equities: Yahoo's live quote API (direct, then via CORS relay), Finnhub as optional fallback.
function fetchWithTimeout(url, ms, opts){
  const ctl = new AbortController();
  const t = setTimeout(() => ctl.abort(), ms);
  return fetch(url, Object.assign({ signal: ctl.signal }, opts || {})).finally(() => clearTimeout(t));
}
async function fetchYahooQuote(ticker){
  const yUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker)}?interval=1m&range=1d`;
  const attempts = [
    { url: yUrl, src: "Yahoo live", ms: 2500 },
    { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`, src: "Yahoo live (relay)", ms: 9000 },
  ];
  for (const a of attempts){
    try {
      const res = await fetchWithTimeout(a.url, a.ms);
      if (!res.ok) continue;
      const d = await res.json();
      const meta = d?.chart?.result?.[0]?.meta;
      if (meta && typeof meta.regularMarketPrice === "number" && meta.regularMarketPrice > 0)
        return { px: meta.regularMarketPrice, src: a.src, qts: (meta.regularMarketTime || 0) * 1000 };
    } catch(e){ /* try next */ }
  }
  if (cfg.finnhub){
    try {
      const res = await fetchWithTimeout(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(ticker)}&token=${encodeURIComponent(cfg.finnhub)}`, 6000);
      const q = await res.json();
      if (q && typeof q.c === "number" && q.c > 0) return { px: q.c, src: "Finnhub", qts: Date.now() };
    } catch(e){}
  }
  return null;
}

async function markToMarket(){
  if (!state.positions.length) return flash("err", "No positions to mark. Add a position first.");
  const btn = document.getElementById("markBtn");
  btn.disabled = true; btn.textContent = "Marking…";
  const errs = [];
  const now = Date.now();
  const crypto = state.positions.filter(p => p.venue === "crypto");
  const equity = state.positions.filter(p => p.venue === "equity");
  const tasks = [];
  if (crypto.length){
    // group by HIP-3 dex: "xyz:PURRDAT" -> dex "xyz"; plain tickers -> default dex
    const byDex = {};
    crypto.forEach(p => {
      const t = p.ticker;
      const dex = t.includes(":") ? t.split(":")[0].toLowerCase() : "";
      (byDex[dex] = byDex[dex] || []).push(p);
    });
    for (const dex of Object.keys(byDex)){
      tasks.push((async () => {
        try {
          const body = dex ? { type:"allMids", dex } : { type:"allMids" };
          const res = await fetchWithTimeout("https://api.hyperliquid.xyz/info", 8000, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
          const mids = await res.json();
          byDex[dex].forEach(p => {
            const k = p.ticker;
            const raw = mids[k] ?? mids[k.toUpperCase()] ?? mids[`${k.toUpperCase()}/USDC`] ?? mids[`${dex}:${k.split(":").pop().toUpperCase()}`];
            if (raw !== undefined) state.prices[p.ticker] = { px: parseFloat(raw), ts: now, src: dex ? `Hyperliquid ${dex} dex` : "Hyperliquid" };
            else errs.push(`${p.ticker}: not on Hyperliquid${dex ? " ("+dex+" dex)" : ""}`);
          });
        } catch(e){ errs.push(`Hyperliquid${dex ? " "+dex : ""} unreachable`); }
      })());
    }
  }
  equity.forEach(p => {
    tasks.push((async () => {
      const q = await fetchYahooQuote(p.ticker.toUpperCase());
      if (q) state.prices[p.ticker] = { px: q.px, ts: q.qts || now, src: q.src };
      else errs.push(`${p.ticker}: no live quote (Yahoo${cfg.finnhub ? "/Finnhub" : ""}) — set a manual mark or ask Claude`);
    })());
  });
  await Promise.all(tasks);
  btn.disabled = false; btn.textContent = "Mark to market";
  commit("Marked to market", errs.length ? `Partial — ${errs.join("; ")}` : `${state.positions.length} positions repriced`);
  flash(errs.length ? "err" : "ok", errs.length ? errs.join(" · ") : "Book marked to market.");
}

// ————— derived —————
function pricedBook(){
  return state.positions.map(p => {
    const q = state.prices[p.ticker];
    const px = q ? q.px : null;
    const isPerp = p.kind === "perp";
    const upl = px !== null && px !== undefined ? (px - p.avgEntry) * p.qty : null;
    // Perps: NAV carries margin + uPnL (the equity in the trade); notional only drives PnL.
    const mv = px === null || px === undefined ? null : (isPerp ? (p.margin || 0) + upl : px * p.qty);
    const base = isPerp ? (p.margin || 0) : p.avgEntry * p.qty; // denominator for return (ROE for perps)
    return { ...p, px, mv, upl, isPerp,
      notional: px !== null && px !== undefined ? px * p.qty : null,
      ret: (upl !== null && base !== 0) ? upl / Math.abs(base) : null,
      src: q?q.src:null, mts: q?q.ts:null };
  }).sort((a,b) => (b.mv||0)-(a.mv||0));
}

// ————— mutations —————
function savePosition(f, existing){
  const pos = { id: existing ? existing.id : uid(), ticker: f.ticker, venue: f.venue, kind: f.kind || "cash",
    qty: f.qty, avgEntry: f.avgEntry, margin: f.margin || 0, leverage: f.leverage || null, liqPx: f.liqPx || null,
    notes: f.notes, openedAt: existing ? existing.openedAt : new Date().toISOString().slice(0,10) };
  const i = state.positions.findIndex(p => p.id === pos.id);
  if (i === -1) state.positions.push(pos); else state.positions[i] = pos;
  commit(existing ? "Position edited" : "Position added",
    `${pos.ticker}: ${fmtNum(pos.qty)} @ ${fmtUSD(pos.avgEntry)}${pos.kind==="perp" ? ` (perp, margin ${fmtUSD(pos.margin,0)})` : ""}`);
}
function deletePosition(id){
  const p = state.positions.find(x => x.id === id);
  state.positions = state.positions.filter(x => x.id !== id);
  commit("Position deleted", p ? p.ticker : id);
}
function setManualPrice(ticker, px){
  state.prices[ticker] = { px, ts: Date.now(), src: "Manual" };
  commit("Manual mark set", `${ticker} @ ${fmtUSD(px)}`);
}
function logTrade(t){
  state.trades.unshift({ ...t, id: uid(), ts: Date.now() });
  const i = state.positions.findIndex(p => p.ticker === t.ticker);
  const existing = i !== -1 ? state.positions[i] : null;
  const isPerp = t.kind === "perp" || (existing && existing.kind === "perp");
  let realizedDelta = 0, marginFlow = 0; // marginFlow: +committed on buy, +released on sell
  if (t.side === "buy"){
    if (!existing){
      state.positions.push({ id: uid(), ticker: t.ticker, venue: t.venue, kind: isPerp ? "perp" : "cash",
        qty: t.qty, avgEntry: t.price, margin: isPerp ? (t.margin || 0) : 0,
        leverage: isPerp && t.margin ? Math.round((t.qty*t.price/t.margin)*10)/10 : null,
        liqPx: null, notes: "", openedAt: t.date });
      marginFlow = isPerp ? (t.margin || 0) : 0;
    } else {
      const p = existing;
      const nq = p.qty + t.qty;
      const upd = { ...p, qty: nq, avgEntry: nq !== 0 ? (p.qty*p.avgEntry + t.qty*t.price)/nq : p.avgEntry };
      if (isPerp){
        upd.kind = "perp";
        upd.margin = (p.margin || 0) + (t.margin || 0);
        marginFlow = t.margin || 0;
        if (upd.margin > 0) upd.leverage = Math.round((nq*upd.avgEntry/upd.margin)*10)/10;
      }
      state.positions[i] = upd;
    }
  } else if (existing){
    const p = existing;
    const sq = Math.min(t.qty, p.qty);
    realizedDelta = sq * (t.price - p.avgEntry); // full notional — correct for perps too
    state.realized += realizedDelta;
    const nq = p.qty - t.qty;
    if (nq <= 1e-7){
      marginFlow = p.kind === "perp" ? (p.margin || 0) : 0; // full close releases all margin
      state.positions.splice(i,1);
    } else {
      const upd = { ...p, qty: nq };
      if (p.kind === "perp"){
        // release what the user specifies; blank = pro-rata with the size reduction
        const released = t.margin ? Math.min(t.margin, p.margin || 0) : (p.margin || 0) * (t.qty / p.qty);
        upd.margin = Math.max(0, (p.margin || 0) - released);
        marginFlow = released;
        if (upd.margin > 0) upd.leverage = Math.round((nq*upd.avgEntry/upd.margin)*10)/10;
      }
      state.positions[i] = upd;
    }
  }
  let cashNote = "";
  if (state.cashSweep){
    // Perps move margin (plus realised PnL on reduces); cash trades move full notional.
    const delta = isPerp
      ? (t.side === "buy" ? -marginFlow : marginFlow + realizedDelta)
      : (t.side === "buy" ? -(t.qty * t.price) : t.qty * t.price);
    state.cash = (state.cash || 0) + delta;
    if (delta !== 0) cashNote = ` · cash ${delta >= 0 ? "+" : "−"}${fmtUSD(Math.abs(delta), 0)}`;
  }
  const ptxt = isPerp ? ` (perp${t.margin ? `, margin ${t.side==="buy" ? "+" : "released "}${fmtUSD(t.margin,0)}` : t.side==="sell" ? ", margin pro-rata" : ""})` : "";
  commit(`Trade: ${t.side.toUpperCase()} ${t.ticker}${isPerp ? " perp" : ""}`,
    `${fmtNum(t.qty)} @ ${fmtUSD(t.price)}${ptxt}${cashNote}${t.commentary ? " — " + t.commentary : ""}`);
}
function deleteTrade(id){
  const t = state.trades.find(x => x.id === id);
  state.trades = state.trades.filter(x => x.id !== id);
  commit("Blotter entry removed", t ? `${t.side.toUpperCase()} ${t.ticker} ${fmtNum(t.qty)} @ ${fmtUSD(t.price)}` : id);
}
function addIdea(f){
  state.ideas.unshift({ ...f, id: uid(), createdAt: Date.now(), status: "watching" });
  commit("Idea filed", `${f.ticker} ${f.direction}`);
}
function setIdeaStatus(id, status){
  const i = state.ideas.find(x => x.id === id);
  if (i){ i.status = status; commit("Idea " + status, i.ticker); }
}
function deleteIdea(id){
  const i = state.ideas.find(x => x.id === id);
  state.ideas = state.ideas.filter(x => x.id !== id);
  commit("Idea deleted", i ? i.ticker : id);
}

    <p class="dim" style="font-size:13px; margin:0 0 14px">Equities mark off Yahoo's live quote API by default — wide coverage, no key needed (direct fetch first, then a CORS relay). Optionally add a free finnhub.io key as a fallback if both Yahoo routes are down. Crypto and HIP-3 tickers (e.g. <code class="kbd">xyz:PURRDAT</code> as venue Crypto) always price via Hyperliquid, 24/7.</p>

    <div class="sheet-foot"><button class="btn" data-act="cfg-save">Save settings</button></div>
  </div>
  <div class="sheet">
    <h3 class="h3" style="margin-bottom:12px">Trading</h3>
    <p class="dim" style="font-size:13px; margin:0 0 14px">When cash sweep is on, logged buys debit the cash balance by notional and sells credit the proceeds. Turn it off to backfill historical trades without touching cash. Positions added directly on the Book page never affect cash.</p>
    <div class="grid"><label class="fld"><span>Cash sweep</span><select class="inp" id="sf-sweep"><option value="yes" ${state.cashSweep?"selected":""}>On — trades move cash</option><option value="no" ${!state.cashSweep?"selected":""}>Off</option></select></label></div>
    <div class="sheet-foot"><button class="btn" data-act="sweep-save">Save trading settings</button></div>
  </div>
  <div class="sheet">
    <h3 class="h3" style="margin-bottom:12px">Backup</h3>
    <div class="sheet-foot" style="justify-content:flex-start">
      <button class="btn" data-act="export">Download JSON backup</button>
      <label class="btn" style="display:inline-block">Import JSON<input type="file" id="importFile" accept=".json" style="display:none"></label>
    </div>
  </div>`;
}

function render(){
  renderTabs();
  renderNav();
  const el = document.getElementById("page");
  el.innerHTML = page==="book" ? renderBook()
    : page==="blotter" ? renderBlotter()
    : page==="ideas" ? renderIdeas()
    : page==="wire" ? renderWire()
    : page==="log" ? renderLog()
    : renderSettings();
  const imp = document.getElementById("importFile");
  if (imp) imp.addEventListener("change", onImport);
}

// ————— events —————
document.addEventListener("click", e => {
  const t = e.target.closest("[data-tab],[data-act]");
  if (!t) return;
  if (t.dataset.tab){ page = t.dataset.tab; render(); return; }
  const act = t.dataset.act;
  if (act === "pos-new"){ document.getElementById("posFormMount").innerHTML = positionFormHTML(null); }
  else if (act === "pos-edit"){ const p = state.positions.find(x=>x.id===t.dataset.id); document.getElementById("posFormMount").innerHTML = positionFormHTML(p); }
  else if (act === "pos-close"){ document.getElementById("posFormMount").innerHTML = ""; }
  else if (act === "pos-save"){
    const form = document.getElementById("posForm");
    const f = { ticker: document.getElementById("pf-ticker").value.trim().toUpperCase(), venue: document.getElementById("pf-venue").value,
      kind: document.getElementById("pf-kind").value,
      qty: parseFloat(document.getElementById("pf-qty").value), avgEntry: parseFloat(document.getElementById("pf-entry").value),
      margin: parseFloat(document.getElementById("pf-margin").value) || 0,
      leverage: parseFloat(document.getElementById("pf-lev").value) || null,
      liqPx: parseFloat(document.getElementById("pf-liq").value) || null,
      notes: document.getElementById("pf-notes").value.trim() };
    if (!f.ticker || !(f.qty>0) || !(f.avgEntry>0)) return flash("err", "Ticker, a positive quantity and a positive entry are required.");
    if (f.kind === "perp" && !(f.margin>0)) return flash("err", "Perp positions need a margin figure — that's what enters your NAV.");
    if (f.kind !== "perp"){ f.margin = 0; f.leverage = null; f.liqPx = null; }
    const existing = form.dataset.id ? state.positions.find(x=>x.id===form.dataset.id) : null;
    savePosition(f, existing);
  }
  else if (act === "pos-del"){ if (confirm("Delete this position?")) deletePosition(t.dataset.id); }
  else if (act === "pos-manual"){
    const v = parseFloat(document.getElementById("pf-manual").value);
    if (v>0) setManualPrice(t.dataset.ticker, v); else flash("err","Enter a positive price.");
  }
  else if (act === "trade-log"){
    const f = { ticker: document.getElementById("tf-ticker").value.trim().toUpperCase(), side: document.getElementById("tf-side").value, qty: parseFloat(document.getElementById("tf-qty").value), price: parseFloat(document.getElementById("tf-price").value), date: document.getElementById("tf-date").value, venue: document.getElementById("tf-venue").value,
      kind: document.getElementById("tf-kind").value,
      margin: parseFloat(document.getElementById("tf-margin").value) || 0,
      commentary: document.getElementById("tf-comm").value.trim() };
    if (!f.ticker || !(f.qty>0) || !(f.price>0)) return flash("err", "Ticker, quantity and price are required.");
    const exists = state.positions.some(p => p.ticker === f.ticker);
    if (f.kind === "perp" && f.side === "buy" && !exists && !(f.margin>0))
      return flash("err", "Opening a new perp needs a margin amount — that's what enters your NAV.");
    logTrade(f);
    flash("ok", `${f.side==="buy"?"Buy":"Sell"} ${fmtNum(f.qty)} ${f.ticker}${f.kind==="perp"?" (perp)":""} @ ${fmtUSD(f.price)} logged — book updated.`);
  }
  else if (act === "trade-del"){ if (confirm("Remove this entry from the blotter? Positions won't be re-adjusted.")) deleteTrade(t.dataset.id); }
  else if (act === "idea-add"){
    const f = { ticker: document.getElementById("if-ticker").value.trim().toUpperCase(), direction: document.getElementById("if-dir").value, thesis: document.getElementById("if-thesis").value.trim(), trigger: document.getElementById("if-trigger").value.trim() };
    if (!f.ticker || !f.thesis) return flash("err", "Ticker and thesis are required.");
    addIdea(f);
  }
  else if (act === "idea-status"){ setIdeaStatus(t.dataset.id, t.dataset.s); }
  else if (act === "idea-del"){ if (confirm("Delete this idea?")) deleteIdea(t.dataset.id); }
  else if (act === "pull"){ pullRemote(false); }
  else if (act === "cfg-save"){
    cfg.key = document.getElementById("sf-key").value.trim();
    cfg.binId = document.getElementById("sf-bin").value.trim();
    cfg.finnhub = document.getElementById("sf-fh") ? document.getElementById("sf-fh").value.trim() : cfg.finnhub;
    cfg.autoPull = document.getElementById("sf-poll").value === "yes";
    persistCfg(); setPolling();
    syncStatus(cfg.binId && cfg.key ? "ok" : "off", cfg.binId && cfg.key ? `Synced · bin ${cfg.binId}` : "Sync off — local only. Configure in Settings.");
    flash("ok", "Settings saved.");
  }
  else if (act === "sweep-save"){
    const on = document.getElementById("sf-sweep").value === "yes";
    if (on !== state.cashSweep){ state.cashSweep = on; commit("Cash sweep " + (on ? "enabled" : "disabled"), ""); }
    flash("ok", "Trading settings saved.");
  }
  else if (act === "cfg-create"){
    cfg.key = document.getElementById("sf-key").value.trim(); persistCfg();
    createBin();
  }
  else if (act === "export"){
    const blob = new Blob([JSON.stringify(state, null, 2)], { type:"application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `private-book-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
  }
});

function onImport(e){
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = () => {
    try {
      const s = JSON.parse(r.result);
      if (!s.positions || !Array.isArray(s.positions)) throw new Error("not a book file");
      state = Object.assign({}, DEFAULT_STATE, s);
      logEvent("Book imported from backup", file.name, "system");
      state.version += 1; persistLocal(); render();
      flash("ok", "Backup imported.");
    } catch(err){ flash("err", "Import failed — not a valid book file."); }
  };
  r.readAsText(file);
}

document.getElementById("pullBtn").addEventListener("click", () => pullRemote(false));
document.getElementById("pushBtn").addEventListener("click", () => pushRemote(false));
document.getElementById("markBtn").addEventListener("click", markToMarket);
document.getElementById("cashBtn").addEventListener("click", () => {
  const v = prompt("Cash balance (USD):", state.cash || 0);
  if (v === null) return;
  const n = parseFloat(v);
  if (isNaN(n)) return flash("err", "Not a number.");
  state.cash = n;
  commit("Cash updated", fmtUSD(n, 0));
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Wipe the entire book — positions, blotter, ideas, log? This cannot be undone.")) return;
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  logEvent("Book reset", "", "system");
  persistLocal(); render();
});

// boot
if (!state.changelog.length) logEvent("Book opened for the first time", "", "system");
render();
if (cfg.binId && cfg.key){ syncStatus("ok", `Synced · bin ${cfg.binId}`); pullRemote(true); }
setPolling();
</script>
</body>
</html>
